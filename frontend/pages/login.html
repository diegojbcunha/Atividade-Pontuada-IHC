<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AgendaFlow</title>
  <meta name="description" content="Acesse o sistema AgendaFlow de agendamento e gestão de atendimentos">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body class="login-page">

  <div class="login-card fade-in">
    <!-- Logotipo e título -->
    <div class="login-logo">
      <div class="login-icon">
        <i class="bi bi-calendar-check"></i>
      </div>
      <h2>AgendaFlow</h2>
      <p>Sistema de Agendamento e Gestão</p>
    </div>

    <!-- Alerta de erro -->
    <div id="alertaErro" class="alert alert-danger d-none" role="alert">
      <i class="bi bi-exclamation-triangle-fill me-2"></i>
      <span id="mensagemErro"></span>
    </div>

    <!-- Formulário de login -->
    <form id="formLogin">
      <div class="mb-3">
        <label for="email" class="form-label">E-mail</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" class="form-control" id="email" placeholder="seu@email.com" required>
        </div>
      </div>

      <div class="mb-4">
        <label for="senha" class="form-label">Senha</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" id="senha" placeholder="Sua senha" required>
          <button class="btn btn-outline-secondary" type="button" id="btnVerSenha">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100" id="btnLogin">
        <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
      </button>
    </form>

    <hr class="my-3">

    <p class="text-center text-muted" style="font-size:13px; margin:0;">
      Não tem conta?
      <a href="registro.html" style="color: var(--cor-primaria); font-weight:600;">Cadastre-se</a>
    </p>
  </div>

  <script src="../services/api.js"></script>
  <script>
    // Se já estiver logado, redireciona para o dashboard
    if (getToken()) {
      window.location.href = 'dashboard.html';
    }

    // Mostrar/esconder senha
    document.getElementById('btnVerSenha').addEventListener('click', function() {
      const campo = document.getElementById('senha');
      const icone = this.querySelector('i');
      if (campo.type === 'password') {
        campo.type = 'text';
        icone.className = 'bi bi-eye-slash';
      } else {
        campo.type = 'password';
        icone.className = 'bi bi-eye';
      }
    });

    // Processar login
    document.getElementById('formLogin').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('btnLogin');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Entrando...';

      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;

      const resultado = await apiPost('/auth/login', { email, senha }, false);

      if (resultado.token) {
        // Login bem-sucedido
        salvarSessao(resultado.token, resultado.usuario);
        window.location.href = 'dashboard.html';
      } else {
        // Mostrar erro
        document.getElementById('mensagemErro').textContent = resultado.erro || 'Erro ao fazer login.';
        document.getElementById('alertaErro').classList.remove('d-none');
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Entrar';
      }
    });
  </script>
</body>
</html>
