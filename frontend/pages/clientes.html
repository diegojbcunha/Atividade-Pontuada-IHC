<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes - AgendaFlow</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
<div class="app-wrapper">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <h4><i class="bi bi-calendar-check me-2"></i>Agenda<span>Flow</span></h4>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-title">Principal</div>
      <a href="dashboard.html" class="nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="agenda.html" class="nav-link"><i class="bi bi-calendar3"></i> Agenda</a>
      <div class="nav-section-title">Gestão</div>
      <a href="gerenciar-agendamentos.html" class="nav-link"><i class="bi bi-list-check"></i> Agendamentos</a>
      <a href="clientes.html" class="nav-link active"><i class="bi bi-people"></i> Clientes</a>
      <a href="espacos.html" class="nav-link"><i class="bi bi-building"></i> Espaços</a>
      <a href="bloqueios.html" class="nav-link"><i class="bi bi-slash-circle"></i> Bloqueios</a>
      <a href="lembretes.html" class="nav-link"><i class="bi bi-bell"></i> Lembretes</a>
      <div class="nav-section-title">Configurações</div>
      <a href="configuracoes.html" class="nav-link"><i class="bi bi-gear"></i> Personalização</a>
      <a href="google-calendar.html" class="nav-link"><i class="bi bi-google"></i> Google Agenda</a>
    </nav>
    <div class="sidebar-footer" id="nomeUsuarioSidebar">–</div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <h1 class="topbar-title"><i class="bi bi-people me-2 text-primary"></i>Clientes</h1>
      <div class="topbar-user">
        <span id="nomeUsuarioTop">–</span>
        <div class="avatar" id="avatarUsuario">?</div>
      </div>
    </div>

    <div class="page-content fade-in">
      <div class="card mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span><i class="bi bi-person-lines-fill me-2"></i>Lista de Clientes</span>
          <button class="btn btn-sm btn-primary" onclick="abrirModal()"><i class="bi bi-plus-circle me-2"></i>Novo Cliente</button>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead>
                <tr>
                  <th>Nome</th>
                  <th>E-mail</th>
                  <th>Telefone</th>
                  <th>Observações</th>
                  <th class="text-end">Ações</th>
                </tr>
              </thead>
              <tbody id="tabelaBody">
                <tr><td colspan="5" class="text-center py-4">Carregando...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal Form -->
<div class="modal fade" id="modalCliente" tabindex="-1">
  <div class="modal-dialog">
    <form class="modal-content" id="formCliente">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">Novo Cliente</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="clienteId">
        <div class="mb-3">
          <label class="form-label">Nome Completo *</label>
          <input type="text" class="form-control" id="clienteNome" required>
        </div>
        <div class="mb-3">
          <label class="form-label">E-mail</label>
          <input type="email" class="form-control" id="clienteEmail">
        </div>
        <div class="mb-3">
          <label class="form-label">Telefone</label>
          <input type="text" class="form-control" id="clienteTelefone">
        </div>
        <div class="mb-3">
          <label class="form-label">Observações</label>
          <textarea class="form-control" id="clienteObs" rows="2"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="submit" class="btn btn-primary">Salvar</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../services/api.js"></script>
<script>
  verificarLogin();
  const usuario = getUsuario();
  if (usuario) {
    document.getElementById('nomeUsuarioTop').textContent = usuario.nome;
    document.getElementById('nomeUsuarioSidebar').textContent = usuario.nome;
    document.getElementById('avatarUsuario').textContent = usuario.nome.charAt(0).toUpperCase();
  }

  let modalInst;

  async function carregar() {
    const clientes = await apiGet('/clientes');
    const tbody = document.getElementById('tabelaBody');

    if (!clientes || clientes.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-muted">Nenhum cliente cadastrado.</td></tr>';
      return;
    }

    tbody.innerHTML = clientes.map(c => `
      <tr>
        <td class="fw-bold">${c.nome}</td>
        <td>${c.email || '-'}</td>
        <td>${c.telefone || '-'}</td>
        <td class="text-muted small">${c.observacoes || '-'}</td>
        <td class="text-end">
          <button class="btn btn-sm btn-outline-secondary me-1" onclick="editar('${c.id}', '${c.nome}', '${c.email||''}', '${c.telefone||''}', '${(c.observacoes||'').replace(/\n/g,' ')}')"><i class="bi bi-pencil"></i></button>
          <button class="btn btn-sm btn-outline-danger" onclick="excluir('${c.id}')"><i class="bi bi-trash"></i></button>
        </td>
      </tr>
    `).join('');
  }

  function abrirModal() {
    document.getElementById('formCliente').reset();
    document.getElementById('clienteId').value = '';
    document.getElementById('modalTitle').textContent = 'Novo Cliente';
    modalInst = new bootstrap.Modal(document.getElementById('modalCliente'));
    modalInst.show();
  }

  function editar(id, nome, email, telefone, obs) {
    document.getElementById('clienteId').value = id;
    document.getElementById('clienteNome').value = nome;
    document.getElementById('clienteEmail').value = email;
    document.getElementById('clienteTelefone').value = telefone;
    document.getElementById('clienteObs').value = obs;
    document.getElementById('modalTitle').textContent = 'Editar Cliente';
    modalInst = new bootstrap.Modal(document.getElementById('modalCliente'));
    modalInst.show();
  }

  document.getElementById('formCliente').addEventListener('submit', async function(e) {
    e.preventDefault();
    const id = document.getElementById('clienteId').value;
    const body = {
      nome: document.getElementById('clienteNome').value,
      email: document.getElementById('clienteEmail').value,
      telefone: document.getElementById('clienteTelefone').value,
      observacoes: document.getElementById('clienteObs').value
    };

    let res;
    if (id) {
      res = await apiPut(`/clientes/${id}`, body);
    } else {
      res = await apiPost('/clientes', body);
    }

    if (res && !res.erro) {
      mostrarToast(id ? 'Cliente atualizado' : 'Cliente cadastrado');
      modalInst.hide();
      carregar();
    } else {
      mostrarToast(res.erro || 'Erro', 'error');
    }
  });

  async function excluir(id) {
    if (confirm('Tem certeza que deseja excluir este cliente?')) {
      const res = await apiDelete(`/clientes/${id}`);
      if (res && !res.erro) {
        mostrarToast('Cliente excluído');
        carregar();
      } else {
        mostrarToast(res.erro || 'Erro', 'error');
      }
    }
  }

  carregar();
</script>
</body>
</html>
