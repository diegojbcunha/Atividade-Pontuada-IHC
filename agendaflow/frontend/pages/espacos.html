<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Espaços - AgendaFlow</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
<div class="app-wrapper">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <h4><i class="bi bi-calendar-check me-2"></i>Agenda<span>Flow</span></h4>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-title">Principal</div>
      <a href="dashboard.html" class="nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="agenda.html" class="nav-link"><i class="bi bi-calendar3"></i> Agenda</a>
      <div class="nav-section-title">Gestão</div>
      <a href="gerenciar-agendamentos.html" class="nav-link"><i class="bi bi-list-check"></i> Agendamentos</a>
      <a href="clientes.html" class="nav-link"><i class="bi bi-people"></i> Clientes</a>
      <a href="espacos.html" class="nav-link active"><i class="bi bi-building"></i> Espaços</a>
      <a href="bloqueios.html" class="nav-link"><i class="bi bi-slash-circle"></i> Bloqueios</a>
      <a href="lembretes.html" class="nav-link"><i class="bi bi-bell"></i> Lembretes</a>
      <div class="nav-section-title">Configurações</div>
      <a href="configuracoes.html" class="nav-link"><i class="bi bi-gear"></i> Personalização</a>
      <a href="google-calendar.html" class="nav-link"><i class="bi bi-google"></i> Google Agenda</a>
    </nav>
    <div class="sidebar-footer" id="nomeUsuarioSidebar">–</div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <h1 class="topbar-title"><i class="bi bi-building me-2 text-primary"></i>Gestão de Espaços</h1>
      <div class="topbar-user">
        <span id="nomeUsuarioTop">–</span>
        <div class="avatar" id="avatarUsuario">?</div>
      </div>
    </div>

    <div class="page-content fade-in">
      <div class="card mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span><i class="bi bi-door-open me-2"></i>Salas, Consultórios e Locais</span>
          <button class="btn btn-sm btn-primary" onclick="abrirModal()"><i class="bi bi-plus-circle me-2"></i>Novo Espaço</button>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead>
                <tr>
                  <th>Nome do Espaço</th>
                  <th>Descrição</th>
                  <th>Capacidade</th>
                  <th>Status</th>
                  <th class="text-end">Ações</th>
                </tr>
              </thead>
              <tbody id="tabelaBody">
                <tr><td colspan="5" class="text-center py-4">Carregando...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal Form -->
<div class="modal fade" id="modalEspaco" tabindex="-1">
  <div class="modal-dialog">
    <form class="modal-content" id="formEspaco">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">Novo Espaço</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="espacoId">
        <div class="mb-3">
          <label class="form-label">Nome *</label>
          <input type="text" class="form-control" id="espacoNome" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Descrição</label>
          <textarea class="form-control" id="espacoDesc" rows="2"></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label">Capacidade (Pessoas)</label>
          <input type="number" class="form-control" id="espacoCap" value="1" min="1">
        </div>
        <div class="form-check form-switch" id="containerAtivo" style="display:none;">
          <input class="form-check-input" type="checkbox" id="espacoAtivo">
          <label class="form-check-label" for="espacoAtivo">Ativo para agendamentos</label>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="submit" class="btn btn-primary">Salvar</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../services/api.js"></script>
<script>
  verificarLogin();
  const usuario = getUsuario();
  if (usuario) {
    document.getElementById('nomeUsuarioTop').textContent = usuario.nome;
    document.getElementById('nomeUsuarioSidebar').textContent = usuario.nome;
    document.getElementById('avatarUsuario').textContent = usuario.nome.charAt(0).toUpperCase();
  }

  let modalInst;

  async function carregar() {
    const espacos = await apiGet('/espacos');
    const tbody = document.getElementById('tabelaBody');

    if (!espacos || espacos.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-muted">Nenhum espaço cadastrado.</td></tr>';
      return;
    }

    tbody.innerHTML = espacos.map(e => `
      <tr>
        <td class="fw-bold">${e.nome}</td>
        <td class="text-muted small">${e.descricao || '-'}</td>
        <td>${e.capacidade}</td>
        <td>
          ${e.ativo 
            ? '<span class="badge bg-success bg-opacity-10 text-success">Ativo</span>' 
            : '<span class="badge bg-secondary bg-opacity-10 text-secondary">Inativo</span>'
          }
        </td>
        <td class="text-end">
          <button class="btn btn-sm btn-outline-secondary me-1" onclick="editar('${e.id}', '${e.nome}', '${(e.descricao||'').replace(/\n/g,' ')}', ${e.capacidade}, ${e.ativo})"><i class="bi bi-pencil"></i></button>
          <button class="btn btn-sm btn-outline-danger" onclick="excluir('${e.id}')"><i class="bi bi-x-circle"></i> Desativar</button>
        </td>
      </tr>
    `).join('');
  }

  function abrirModal() {
    document.getElementById('formEspaco').reset();
    document.getElementById('espacoId').value = '';
    document.getElementById('modalTitle').textContent = 'Novo Espaço';
    document.getElementById('containerAtivo').style.display = 'none';
    modalInst = new bootstrap.Modal(document.getElementById('modalEspaco'));
    modalInst.show();
  }

  function editar(id, nome, desc, cap, ativo) {
    document.getElementById('espacoId').value = id;
    document.getElementById('espacoNome').value = nome;
    document.getElementById('espacoDesc').value = desc;
    document.getElementById('espacoCap').value = cap;
    document.getElementById('espacoAtivo').checked = ativo;
    document.getElementById('containerAtivo').style.display = 'block';
    
    document.getElementById('modalTitle').textContent = 'Editar Espaço';
    modalInst = new bootstrap.Modal(document.getElementById('modalEspaco'));
    modalInst.show();
  }

  document.getElementById('formEspaco').addEventListener('submit', async function(e) {
    e.preventDefault();
    const id = document.getElementById('espacoId').value;
    const body = {
      nome: document.getElementById('espacoNome').value,
      descricao: document.getElementById('espacoDesc').value,
      capacidade: document.getElementById('espacoCap').value
    };

    if (id) {
      body.ativo = document.getElementById('espacoAtivo').checked;
    }

    let res;
    if (id) {
      res = await apiPut(`/espacos/${id}`, body);
    } else {
      res = await apiPost('/espacos', body);
    }

    if (res && !res.erro) {
      mostrarToast(id ? 'Espaço atualizado' : 'Espaço criado');
      modalInst.hide();
      carregar();
    } else {
      mostrarToast(res.erro || 'Erro', 'error');
    }
  });

  async function excluir(id) {
    if (confirm('Tem certeza que deseja desativar este espaço? Não será mais possível agendar nele.')) {
      const res = await apiDelete(`/espacos/${id}`);
      if (res && !res.erro) {
        mostrarToast('Espaço desativado');
        carregar();
      } else {
        mostrarToast(res.erro || 'Erro', 'error');
      }
    }
  }

  carregar();
</script>
</body>
</html>
