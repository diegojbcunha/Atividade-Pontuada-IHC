<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciar Agendamentos - AgendaFlow</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
<div class="app-wrapper">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <h4><i class="bi bi-calendar-check me-2"></i>Agenda<span>Flow</span></h4>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-title">Principal</div>
      <a href="dashboard.html" class="nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="agenda.html" class="nav-link"><i class="bi bi-calendar3"></i> Agenda</a>
      <div class="nav-section-title">Gestão</div>
      <a href="gerenciar-agendamentos.html" class="nav-link active"><i class="bi bi-list-check"></i> Agendamentos</a>
      <a href="clientes.html" class="nav-link"><i class="bi bi-people"></i> Clientes</a>
      <a href="espacos.html" class="nav-link"><i class="bi bi-building"></i> Espaços</a>
      <a href="bloqueios.html" class="nav-link"><i class="bi bi-slash-circle"></i> Bloqueios</a>
      <a href="lembretes.html" class="nav-link"><i class="bi bi-bell"></i> Lembretes</a>
      <div class="nav-section-title">Configurações</div>
      <a href="configuracoes.html" class="nav-link"><i class="bi bi-gear"></i> Personalização</a>
      <a href="google-calendar.html" class="nav-link"><i class="bi bi-google"></i> Google Agenda</a>
    </nav>
    <div class="sidebar-footer" id="nomeUsuarioSidebar">–</div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <h1 class="topbar-title"><i class="bi bi-list-check me-2 text-primary"></i>Gerenciar Agendamentos</h1>
      <div class="topbar-user">
        <span id="nomeUsuarioTop">–</span>
        <div class="avatar" id="avatarUsuario">?</div>
      </div>
    </div>

    <div class="page-content fade-in">
      <div class="card mb-4">
        <div class="card-body">
          <div class="row g-3 align-items-end">
            <div class="col-md-3">
              <label class="form-label">Filtrar Status</label>
              <select class="form-select" id="filtroStatus" onchange="carregarAgendamentos()">
                <option value="">Todos</option>
                <option value="agendado">Agendado</option>
                <option value="confirmado">Confirmado</option>
                <option value="pendente">Pendente</option>
                <option value="concluido">Concluído</option>
                <option value="cancelado">Cancelado</option>
              </select>
            </div>
            <div class="col-md-4">
             <label class="form-label">Buscar / Refrescar</label>
             <div>
              <button class="btn btn-outline-secondary" onclick="carregarAgendamentos()"><i class="bi bi-arrow-clockwise"></i> Atualizar</button>
             </div>
            </div>
            <div class="col-md-5 text-end">
              <a href="agendamento-publico.html" target="_blank" class="btn btn-primary"><i class="bi bi-plus"></i> Novo Manual</a>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead>
                <tr>
                  <th>Título / Cliente</th>
                  <th>Data e Hora</th>
                  <th>Local</th>
                  <th>Status</th>
                  <th class="text-end">Ações Rápidas (Mudar Status)</th>
                </tr>
              </thead>
              <tbody id="tabelaBody">
                <tr><td colspan="5" class="text-center py-4">Carregando...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../services/api.js"></script>
<script>
  verificarLogin();
  const usuario = getUsuario();
  if (usuario) {
    document.getElementById('nomeUsuarioTop').textContent = usuario.nome;
    document.getElementById('nomeUsuarioSidebar').textContent = usuario.nome;
    document.getElementById('avatarUsuario').textContent = usuario.nome.charAt(0).toUpperCase();
  }

  async function carregarAgendamentos() {
    const status = document.getElementById('filtroStatus').value;
    let endpoint = '/agendamentos';
    if(status) endpoint += `?status=${status}`;

    const agendamentos = await apiGet(endpoint);
    const tbody = document.getElementById('tabelaBody');

    if (!agendamentos || agendamentos.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-muted">Nenhum agendamento encontrado.</td></tr>';
      return;
    }

    tbody.innerHTML = agendamentos.map(a => `
      <tr>
        <td>
          <div class="fw-bold">${a.titulo}</div>
          <div class="small text-muted">${a.clientes ? a.clientes.nome : 'Cliente não associado'}</div>
        </td>
        <td>
          <div>${new Date(a.data_inicio).toLocaleDateString()}</div>
          <div class="small text-muted">${new Date(a.data_inicio).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} - ${new Date(a.data_fim).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
        </td>
        <td>${a.espacos ? a.espacos.nome : '-'}</td>
        <td><span class="badge-status badge-${a.status}">${a.status.toUpperCase()}</span></td>
        <td class="text-end">
          <button class="btn btn-sm btn-outline-success mx-1" onclick="mudarStatus('${a.id}', 'confirmado')" title="Confirmar"><i class="bi bi-check-lg"></i></button>
          <button class="btn btn-sm btn-outline-secondary mx-1" onclick="mudarStatus('${a.id}', 'concluido')" title="Concluir"><i class="bi bi-archive"></i></button>
          <button class="btn btn-sm btn-outline-danger mx-1" onclick="mudarStatus('${a.id}', 'cancelado')" title="Cancelar"><i class="bi bi-x-lg"></i></button>
          <button class="btn btn-sm btn-outline-danger ms-2" onclick="excluir(${a.id ? "'" + a.id + "'" : null})" title="Excluir do Banco"><i class="bi bi-trash"></i></button>
        </td>
      </tr>
    `).join('');
  }

  async function mudarStatus(id, novoStatus) {
    const res = await apiPatch(`/agendamentos/${id}/status`, { status: novoStatus });
    if(res && !res.erro) {
      mostrarToast(`Status alterado para ${novoStatus}`);
      carregarAgendamentos();
    } else {
      mostrarToast(res.erro || 'Erro ao alterar status', 'error');
    }
  }

  async function excluir(id) {
    if(!id) return;
    if(confirm('Tem certeza que deseja excluir DEIFINITIVAMENTE este agendamento?')) {
      const res = await apiDelete(`/agendamentos/${id}`);
      if(res && !res.erro) {
        mostrarToast('Agendamento excluído');
        carregarAgendamentos();
      } else {
        mostrarToast(res.erro || 'Erro ao excluir', 'error');
      }
    }
  }

  carregarAgendamentos();
</script>
</body>
</html>
